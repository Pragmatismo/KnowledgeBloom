<!doctype html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flashcards · Knowledge in Bloom</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="game">

  </main>
  <script type="module" src="game.js"></script>

</html>
